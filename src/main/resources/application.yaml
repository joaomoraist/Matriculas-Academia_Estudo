spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_frequency
    username: gym_user

    #Senha do seu banco de dados
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect